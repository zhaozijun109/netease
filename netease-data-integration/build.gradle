ext {
  cmdCaller = { commandln ->
    def stdout = new ByteArrayOutputStream()
    exec {
      commandLine commandln
      standardOutput = stdout
    }
    return stdout.toString().trim()
  }
  createVersionFile = { versionFile ->
    println("Create version file")
    String gitCommitHash = cmdCaller(['git', 'rev-parse', 'HEAD']);
    String gitRepo = cmdCaller(['git', 'config', '--get', 'remote.origin.url']);
    def date = new Date()
    def format = new SimpleDateFormat("yyyy-MM-dd HH:mm:ss")
    format.setTimeZone(TimeZone.getTimeZone("GMT+8"))
    def formattedTime = format.format(date)
    def versionString = """version=${project.property("ndi-version")}
          |packageTime=${formattedTime}
          |commit=${gitCommitHash}
          |remoteOriginUrl=${gitRepo}
""".stripMargin()
    println(versionString)
    versionFile.parentFile.mkdirs()
    versionFile.write(versionString)
  }
}