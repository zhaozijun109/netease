task createPackageDir {
  file("build/package/ndi-service-web/conf").mkdirs()
  file("build/package/ndi-service-web/lib").mkdirs()
  file("build/package/ndi-service-web/bin").mkdirs()
}

task copyLib(type: Copy) {
  dependsOn build, createPackageDir
  from(configurations.runtimeClasspath)
  from("build/libs")
  into("build/package/ndi-service-web/lib")
}

task copyConf(type: Copy) {
  dependsOn build, createPackageDir
  def env = "develop"
  if (project.hasProperty("env")) {
    env = project.property("env")
  }
  from("src/main/conf/${env}")
  into("build/package/ndi-service-web/conf/")
}

task createPackageTar(type: Tar) {
  dependsOn copyLib, copyConf
  compression Compression.GZIP
  from("build/package/")
  archiveBaseName = "ndi-service-web"
  archiveExtension = "tar.gz"
  archiveVersion = "${project.property("ndi-version")}"
  destinationDirectory = file("build")

  doFirst {
    createVersionFile(file("build/package/ndi-service-web/VERSION"))
  }
}
