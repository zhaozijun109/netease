LOG_DIR=${log.dir}
log4j.rootLogger=INFO, Console, Error, Trace
log4j.appender.Console=org.apache.log4j.DailyRollingFileAppender
log4j.appender.Console.DatePattern='.'yyyy-MM-dd
log4j.appender.Console.File=${LOG_DIR}/ndi-info.log
log4j.appender.Console.layout=org.apache.log4j.PatternLayout
log4j.appender.Console.layout.ConversionPattern=%d{yyyy/MM/dd HH:mm:ss} %p [%c{1}][%X{REQ_ID}][Thread-%t] %m%n

log4j.appender.Error=org.apache.log4j.DailyRollingFileAppender
log4j.appender.Error.Threshold = ERROR
log4j.appender.Error.DatePattern='.'yyyy-MM-dd
log4j.appender.Error.File=${LOG_DIR}/ndi-error.log
log4j.appender.Error.layout=org.apache.log4j.PatternLayout
log4j.appender.Error.layout.ConversionPattern=%d{yyyy/MM/dd HH:mm:ss.} %p [%c{1}][%X{REQ_ID}][Thread-%t] %m%n

log4j.logger.Trace=INFO, NDI-TRACE
log4j.appender.Trace=org.apache.log4j.DailyRollingFileAppender
log4j.appender.Trace.DatePattern='.'yyyy-MM-dd
log4j.appender.Trace.File=${LOG_DIR}/ndi-trace.log
log4j.appender.Trace.layout=org.apache.log4j.PatternLayout
log4j.appender.Trace.layout.ConversionPattern=%d{yyyy/MM/dd HH:mm:ss.} %p [%c{1}][%X{REQ_ID}][Thread-%t] %m%n

