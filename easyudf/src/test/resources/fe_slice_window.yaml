entity:
  - expr: user_id
    as: user
  - expr: item_id
    as: item
  - expr: blog_id
    as: blog
  - expr: user_id,business_type
    as: user_x_business_type
target:
  - expr: exposed_count
  - expr: click_count
  - expr: return_gift_count
window:
  - expr: day>date_sub('${last_day}', 1)
  - expr: day>date_sub('${last_day}', 3)
    as: 3d
  - expr: day>date_sub('${last_day}', 7)
    as: 7d
  - expr: day>date_sub('${last_day}', 15)
    as: 15d
  - expr: day>date_sub('${last_day}', 30)
    as: 30d
agg:
  - expr: sum(?)
  - expr: count(distinct if(? > 0, day, null))
    as: days
apply:
  - expr: ?/?
    target: return_gift_count,exposed_count
    as: exposed_cgr
  - expr: ?/?
    target: return_gift_count,click_count
    as: click_cgr