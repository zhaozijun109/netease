services:
  mysql:
    image: mysql:8.0
    container_name: ai-service-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ai_service
      MYSQL_USER: ai_user
      MYSQL_PASSWORD: ai_pass
    ports:
      - "3306:3306"
    volumes:
      - ai_mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  ai_mysql_data:
